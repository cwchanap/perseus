name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'packages/infrastructure/**'
      - 'apps/api/**'
      - 'apps/workflows/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:

concurrency:
  group: pulumi-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.1'

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build --filter=@perseus/web

      - name: Build API worker
        run: bun run build --filter=@perseus/api

      - name: Build workflows worker
        run: bun run build --filter=@perseus/workflows

      - name: Build infrastructure
        run: bun run build --filter=@perseus/infrastructure

      - name: Authenticate with Pulumi
        uses: pulumi/auth-actions@v1
        with:
          organization: ${{ vars.PULUMI_ORG }}
          requested-token-type: urn:pulumi:token-type:access_token:organization

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$CF_ACCOUNT_ID" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "$JWT_SECRET" ] && missing+=("JWT_SECRET")
          [ -z "$ADMIN_PASSKEY" ] && missing+=("ADMIN_PASSKEY")
          [ -z "$PULUMI_CONFIG_PASSPHRASE" ] && missing+=("PULUMI_CONFIG_PASSPHRASE")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: The following required secrets are not configured:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSKEY: ${{ secrets.ADMIN_PASSKEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Setup Pulumi
        uses: pulumi/actions@v6
        with:
          pulumi-version: '3.160.0'

      - name: Configure Pulumi stack
        working-directory: packages/infrastructure
        run: |
          pulumi stack select production --create
          pulumi config set cloudflareAccountId "$CF_ACCOUNT_ID"
          if [ -n "$ALLOWED_ORIGINS" ]; then
            pulumi config set allowedOrigins "$ALLOWED_ORIGINS"
          fi
          pulumi config set --secret jwtSecret "$JWT_SECRET"
          pulumi config set adminPasskey "$ADMIN_PASSKEY"
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSKEY: ${{ secrets.ADMIN_PASSKEY }}

      - name: Pulumi Preview
        working-directory: packages/infrastructure
        run: pulumi preview
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Pulumi Up
        if: github.ref == 'refs/heads/main'
        working-directory: packages/infrastructure
        run: pulumi up --refresh --yes
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
