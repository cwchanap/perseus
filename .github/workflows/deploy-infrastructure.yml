name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'packages/infrastructure/**'
      - 'apps/api/**'
      - 'apps/workflows/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:

concurrency:
  group: pulumi-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.1'

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build --filter=@perseus/web

      - name: Build API worker
        run: bun run build --filter=@perseus/api

      - name: Build workflows worker
        run: bun run build --filter=@perseus/workflows

      - name: Build infrastructure
        run: bun run build --filter=@perseus/infrastructure

      - name: Authenticate with Pulumi
        uses: pulumi/auth-actions@v1
        with:
          organization: ${{ vars.PULUMI_ORG }}
          requested-token-type: urn:pulumi:token-type:access_token:organization

      - name: Setup Pulumi
        uses: pulumi/actions@v6
        with:
          pulumi-version: '3.144.0'

      - name: Configure Pulumi stack
        working-directory: packages/infrastructure
        run: |
          pulumi stack select production --create
          pulumi config set cloudflareAccountId ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          if [ -n "${{ secrets.ALLOWED_ORIGINS }}" ]; then
            pulumi config set allowedOrigins "${{ secrets.ALLOWED_ORIGINS }}"
          fi
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            pulumi config set --secret jwtSecret "${{ secrets.JWT_SECRET }}"
          fi
          if [ -n "${{ secrets.ADMIN_PASSKEY }}" ]; then
            pulumi config set --secret adminPasskey "${{ secrets.ADMIN_PASSKEY }}"
          fi
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Pulumi Preview
        working-directory: packages/infrastructure
        run: pulumi preview
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Pulumi Up
        if: github.ref == 'refs/heads/main'
        working-directory: packages/infrastructure
        run: pulumi up --refresh --yes
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
