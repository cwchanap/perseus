name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'packages/infrastructure/**'
      - 'apps/api/**'
      - 'apps/workflows/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-infrastructure.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/infrastructure/**'
      - 'apps/api/**'
      - 'apps/workflows/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:

concurrency:
  group: pulumi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.1'

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build --filter=@perseus/web

      - name: Build API worker
        run: bun run build --filter=@perseus/api

      - name: Build workflows worker
        run: bun run build --filter=@perseus/workflows

      - name: Build infrastructure
        run: bun run build --filter=@perseus/infrastructure

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/workflows/dist
            apps/web/build
            packages/infrastructure/dist
          retention-days: 1

  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.1'

      - name: Install dependencies
        run: bun install

      - name: Authenticate with Pulumi
        uses: pulumi/auth-actions@v1
        with:
          organization: ${{ vars.PULUMI_ORG }}
          requested-token-type: urn:pulumi:token-type:access_token:organization

      - name: Pulumi Preview
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ vars.PULUMI_ORG }}/perseus-infrastructure/production
          work-dir: packages/infrastructure
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.1'

      - name: Install dependencies
        run: bun install

      - name: Authenticate with Pulumi
        uses: pulumi/auth-actions@v1
        with:
          organization: ${{ vars.PULUMI_ORG }}
          requested-token-type: urn:pulumi:token-type:access_token:organization

      - name: Select Pulumi stack
        working-directory: packages/infrastructure
        run: pulumi stack select ${{ vars.PULUMI_ORG }}/perseus-infrastructure/production --create
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Configure Pulumi stack
        working-directory: packages/infrastructure
        run: |
          pulumi config set cloudflareAccountId ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          if [ -n "${{ secrets.ALLOWED_ORIGINS }}" ]; then
            pulumi config set allowedOrigins "${{ secrets.ALLOWED_ORIGINS }}"
          fi
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            pulumi config set --secret jwtSecret "${{ secrets.JWT_SECRET }}"
          fi
          if [ -n "${{ secrets.ADMIN_PASSKEY }}" ]; then
            pulumi config set --secret adminPasskey "${{ secrets.ADMIN_PASSKEY }}"
          fi
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Pulumi Up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ vars.PULUMI_ORG }}/perseus-infrastructure/production
          work-dir: packages/infrastructure
          refresh: true
          upsert: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
